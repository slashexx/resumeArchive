name: Convert LaTeX to PDF

on:
  push:
    branches: [ main, master ]
    paths:
      - 'main.tex'
      - 'elaborated.tex'
  workflow_dispatch:

jobs:
  latex-to-pdf:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Install LaTeX
      run: |
        sudo apt update
        sudo apt install -y texlive-latex-base texlive-latex-recommended texlive-fonts-recommended texlive-latex-extra texlive-fonts-extra

    - name: Compile main.tex
      run: |
        pdflatex -interaction=nonstopmode main.tex
        if [ ! -f main.pdf ]; then
          echo "❌ main.tex compilation failed."
          exit 1
        fi
        echo "✅ main.pdf compilation successful!"
        ls -la main.pdf

    - name: Compile elaborated.tex
      id: compile-elaborated
      run: |
        if [ ! -f elaborated.tex ]; then
          echo "elaborated.tex not present, skipping."
          echo "built=false" >> $GITHUB_OUTPUT
          exit 0
        fi
        # Run twice so cross-references and TOC-like structures resolve
        pdflatex -interaction=nonstopmode elaborated.tex
        pdflatex -interaction=nonstopmode elaborated.tex
        if [ ! -f elaborated.pdf ]; then
          echo "❌ elaborated.tex compilation failed."
          exit 1
        fi
        echo "✅ elaborated.pdf compilation successful!"
        ls -la elaborated.pdf
        echo "built=true" >> $GITHUB_OUTPUT

    - name: Generate PDF filenames with current date
      id: generate-filename
      run: |
        current_date=$(date +%y_%m_%d)
        main_filename="Dhruv_s_resume___${current_date}.pdf"
        elaborated_filename="Elaborated_Dhruv_s_resume___${current_date}.pdf"

        echo "main_filename=$main_filename" >> $GITHUB_OUTPUT
        echo "elaborated_filename=$elaborated_filename" >> $GITHUB_OUTPUT
        echo "current_date=$current_date" >> $GITHUB_OUTPUT

    - name: Rename PDFs and prepare for commit
      run: |
        main_filename="${{ steps.generate-filename.outputs.main_filename }}"
        elaborated_filename="${{ steps.generate-filename.outputs.elaborated_filename }}"

        cp main.pdf "$main_filename"
        if [ -f elaborated.pdf ]; then
          cp elaborated.pdf "$elaborated_filename"
        fi

        ls -la *.pdf
        git config --global user.name "slashexx"
        git config --global user.email "dhruvpuri.35@gmail.com"

    - name: Stage PDFs and commit
      run: |
        main_filename="${{ steps.generate-filename.outputs.main_filename }}"
        elaborated_filename="${{ steps.generate-filename.outputs.elaborated_filename }}"
        current_date="${{ steps.generate-filename.outputs.current_date }}"

        # Remove any previously-tracked same-day files so today's regeneration replaces them cleanly
        for f in "$main_filename" "$elaborated_filename"; do
          if [ -f "$f" ] && git ls-files --error-unmatch "$f" > /dev/null 2>&1; then
            echo "Replacing existing $f"
            git rm --cached "$f" || true
          fi
        done

        git add "$main_filename"
        [ -f "$elaborated_filename" ] && git add "$elaborated_filename"

        if git diff --staged --quiet; then
          echo "No changes to commit (PDFs identical)."
        else
          git commit -m "🤖 Update resume PDFs for ${current_date}"
          git push origin main
          echo "✅ PDFs committed and pushed."
        fi

    - name: Create summary
      run: |
        main_filename="${{ steps.generate-filename.outputs.main_filename }}"
        elaborated_filename="${{ steps.generate-filename.outputs.elaborated_filename }}"
        current_date="${{ steps.generate-filename.outputs.current_date }}"

        echo "## 📄 LaTeX to PDF Conversion Summary" >> $GITHUB_STEP_SUMMARY
        echo "- **Date:** $current_date" >> $GITHUB_STEP_SUMMARY
        echo "- **One-page resume:** \`$main_filename\`" >> $GITHUB_STEP_SUMMARY
        if [ -f "$elaborated_filename" ]; then
          echo "- **Elaborated resume:** \`$elaborated_filename\`" >> $GITHUB_STEP_SUMMARY
        fi

        for f in "$main_filename" "$elaborated_filename"; do
          if [ -f "$f" ]; then
            size=$(ls -lh "$f" | awk '{print $5}')
            echo "  - \`$f\` — $size" >> $GITHUB_STEP_SUMMARY
          fi
        done
